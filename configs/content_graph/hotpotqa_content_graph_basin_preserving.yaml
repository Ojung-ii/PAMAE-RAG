experiment:
  name: hotpotqa_content_graph_basin_preserving
  seed: 42
  limit_queries: 100

pamae:
  retrieval_variant: basin_preserving_medoids
  renderer: cell_top_rho
  relevance_mode: current
  distance_mode: hybrid_sem_graph
  distance_weights:
    semantic: 0.7
    graph: 0.3
  graph:
    enabled: true
    source: content
    disconnected_distance: 2.0
    max_edges_per_node: 32
  k: 3
  k_max: 4
  num_samples: 5
  sample_size_per_k: 16
  sample_size_cap: 64
  basin_min_expected_samples: 1.0
  max_context_tokens: 512
  max_context_nodes: 8
  evidence_per_anchor: 1
