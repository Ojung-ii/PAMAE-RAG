experiment:
  name: hotpotqa_graph_knn8
  seed: 42
  limit_queries: 100

pamae:
  relevance_mode: title_aware
  distance_mode: graph_sp
  graph:
    enabled: true
    disconnected_distance: 2.0
    max_edges_per_node: 32
    edge_lengths:
      same_canonical_title: 0.25
      title_mention: 0.50
      shared_query_span: 0.75
    backbone:
      enabled: true
      mode: knn
      k: 8
      length_mode: semantic_distance
      max_edges_per_node: 32

