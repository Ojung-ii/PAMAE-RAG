experiment:
  name: hotpotqa_rho_hybrid_title_semantic_top_rho
  seed: 42
  limit_queries: 100

pamae:
  retrieval_variant: top_rho
  renderer: global_top_rho
  relevance_mode: hybrid_title_semantic
  relevance_weights:
    lexical: 0.25
    title: 0.20
    entity_title: 0.25
    semantic: 0.30
  k: 3
  k_max: 4
  num_samples: 5
  sample_size_per_k: 16
  sample_size_cap: 64
  max_context_tokens: 512
  max_context_nodes: 8
  evidence_per_anchor: 1
